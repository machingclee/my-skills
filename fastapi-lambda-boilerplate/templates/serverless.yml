# FastAPI + AWS Lambda + Serverless Framework boilerplate
# Docs: https://www.serverless.com/framework/docs
service: my-fastapi-app      # TODO: rename to your project

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.12        # keep aligned with pyproject.toml requires-python
  architecture: x86_64       # Lambda arch (arm64 also valid)
  region: ap-northeast-1     # TODO: your AWS region
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30

# ONE Lambda function handles every route. The {proxy+} catch-all forwards the
# full path + method to the function; Mangum (in handler.py) dispatches it to
# the matching FastAPI route. Add routes in app.py — no serverless change needed.
functions:
  app:
    handler: handler.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY

plugins:
  - serverless-python-requirements

package:
  # NOTE: .env is shipped inside the deployment package. Convenient, but it
  # means secrets live in the uploaded artifact. For production prefer Lambda
  # environment variables (provider.environment) or SSM/Secrets Manager, and
  # remove .env from `include`.
  include:
    - .env
  exclude:
    - node_modules/**
    - .venv/**
    - .git/**
    - .gitignore
    - .requirements.zip
    - __pycache__/**
    - .python-version
    - .github/**

custom:
  pythonRequirements:
    dockerizePip: true       # builds Linux wheels in Docker (required on macOS)
    useStaticCache: false
    zip: false
